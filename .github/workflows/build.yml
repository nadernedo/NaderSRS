name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install
        run: npm install
      - name: Prepare APK
        run: |
          echo '{ "build": { "preview": { "android": { "buildType": "apk" } } } }' > eas.json
      - name: Build
        run: eas build --platform android --profile preview --non-interactive

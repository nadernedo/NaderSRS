name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Extract and Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          unzip -o *.zip
          TARGET=$(dirname "$(find . -name 'package.json' | head -n 1)")
          echo "Found project in $TARGET"
          cd "$TARGET"
          npm install
          echo '{ "build": { "preview": { "android": { "buildType": "apk" } } } }' > eas.json
          eas build --platform android --profile preview --non-interactive
